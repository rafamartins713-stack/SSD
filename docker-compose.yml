services:
  bootstrap:
    build: .
    command: none 8080
    ports:
      - "8080:8080"
      - "9080:9080"

  vendedor:
    build: .
    command: bootstrap:8080 8081
    ports:
      - "8081:8081"
      - "9081:9081"
    depends_on:
      - bootstrap

  comprador_a:
    build: .
    command: bootstrap:8080 8082
    ports:
      - "8082:8082"
      - "9082:9082"
    depends_on:
      - bootstrap

  comprador_b:
    build: .
    command: bootstrap:8080 8083
    ports:
      - "8083:8083"
      - "9083:9083"
    depends_on:
      - bootstrap

  comprador_c:
    build: .
    command: bootstrap:8080 8084
    ports:
      - "8084:8084"
      - "9084:9084"
    depends_on:
      - bootstrap